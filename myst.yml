version: 1
project:
  title: Spatial Data Management with DuckDB
  authors:
    - name: Qiusheng Wu
  copyright: "2025"
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - "**.ipynb_checkpoints"
  github: giswqs/duckdb-spatial
  thebe:
    binder:
      repo: giswqs/duckdb-spatial
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - book/references.bib
  toc:
    - file: index.md
    - file: book/preface.md
    - title: DuckDB Foundations
      children:
        - file: book/foundations/introduction.md
        - file: book/foundations/sql-basics.md
        - file: book/foundations/python-api.md
    - title: Spatial Data Operations
      children:
        - file: book/spatial/data-import.md
        - file: book/spatial/data-export.md
        - file: book/spatial/geometries.md
        - file: book/spatial/spatial-relationships.md
        - file: book/spatial/spatial-joins.md
        - file: book/spatial/data-viz.md
        - file: book/spatial/pmtiles.md
    - title: Real-World Geospatial Analytics
      children:
        - file: book/analytics/wetlands.md
        - file: book/analytics/buildings.md
        - file: book/analytics/taxi.md
        - file: book/analytics/dashboards.md
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    folders: true
    analytics_google: G-N1J4YR52HZ
  template: book-theme
  parts:
    primary_sidebar_footer: ""
